name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-test:
    name: Lint, test & generate demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ./libs
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Unit tests
        run: pytest -q

      - name: Generate offline comparison (no cluster needed)
        run: python -m experiments.run_comparison --mode sim --day-seconds 600

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: forescale-results
          path: results/

  build-smoke:
    name: Build images & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -f services/inference-api/Dockerfile \
            -t forescale/inference-api:latest services/inference-api
          docker build -f services/load-generator/Dockerfile \
            -t forescale/load-generator:latest .
          docker build -f services/forescale-controller/Dockerfile \
            -t forescale/controller:latest .

      - name: Smoke test inference-api via docker compose
        run: |
          docker compose up -d inference-api
          echo "waiting for health..."
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8080/healthz; then echo " healthy"; break; fi
            sleep 2
          done
          echo "calling /predict..."
          curl -fs -X POST http://localhost:8080/predict -H 'content-type: application/json' -d '{}' \
            | tee /dev/stderr | grep -q '"pod"'
          echo "checking /metrics..."
          curl -fs http://localhost:8080/metrics | grep -q inference_request_latency_seconds_bucket
          docker compose down
