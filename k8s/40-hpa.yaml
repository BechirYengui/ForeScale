# Native HorizontalPodAutoscaler -- the REACTIVE baseline.
#
# Used only in reactive mode. In predictive mode the controller owns the replica
# count, so this HPA must be DELETED (two controllers fighting over replicas is
# the classic mistake). `make demo-reactive` applies it; `make demo-predictive`
# removes it.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inference-api
  namespace: forescale
  labels:
    app.kubernetes.io/part-of: forescale
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inference-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
